<div class="lang-switcher">
  <select
    [value]="currentLang"
    (change)="switchLang($any($event.target).value)"
    aria-label="Language"
  >
    @for (lang of languages; track lang) {
      <option [value]="lang" [selected]="lang === currentLang">{{ lang | uppercase }}</option>
    }
  </select>
</div>

<router-outlet />
<app-toast />
<app-reconnect-overlay />
